version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Bogota
    target-branch: master
    open-pull-requests-limit: 10
    commit-message:
      prefix: composer
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Bogota
    target-branch: master
    open-pull-requests-limit: 10
    commit-message:
      prefix: github-actions
    labels:
      - dependencies
      - ci
