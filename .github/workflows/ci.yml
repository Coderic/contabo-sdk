name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run tests
        run: composer test

      - name: Run PHPStan
        run: composer analyse

      - name: Check code style
        run: composer format:check

      - name: Check OpenAPI sync
        run: bash scripts/diff-openapi.sh
